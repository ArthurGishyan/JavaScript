<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <button id="start-btn">Начать тест по JS</button>

    <div class="modal-overlay" id="quiz-modal">
        <div class="modal-content">
            <div id="progress">Вопрос 1 из 20</div>
            <h2 id="question-text">Текст вопроса</h2>
            
            <div class="options" id="options-container">
                </div>

            <div id="explanation">Здесь будет объяснение</div>
            
            <button id="next-btn">Дальше ➔</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
